<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Team Task Manager</title>
</head>
<body>

    <header>
        <h1>Team Task Manager</h1>
        <div class="task-form">
            <input type="text" id="taskInput" placeholder="Enter new task...">
            <select id="priorityInput">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
            <button onclick="addTask()">+ Add Task</button>
        </div>
    </header>

    <main class="board">
        <section class="column" id="backlog-col">
            <h2>Backlog</h2>
            <div class="task-list" id="backlog"></div>
        </section>

        <section class="column" id="inprogress-col">
            <h2>In Progress</h2>
            <div class="task-list" id="inprogress"></div>
        </section>

        <section class="column" id="completed-col">
            <h2>Completed</h2>
            <div class="task-list" id="completed"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
