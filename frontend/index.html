<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task management system</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-view" class="glass-card">
        <h1>Welcome</h1>
        <p>Login to sync your tasks</p>
        <input type="text" id="usernameInput" placeholder="Enter your name...">
        <button onclick="login()">Get Started</button>
    </div>

    <div id="app-view" class="glass-card hidden">
        <h2 id="greet">Hello!</h2>
        <input type="text" id="searchInput" placeholder="Search tasks..." oninput="searchTasks()">
        
        <div style="display:flex; gap:5px;">
            <input type="text" id="taskInput" placeholder="Add a task...">
            <button onclick="addTask()" style="width: 80px;">Add</button>
        </div>

        <ul id="taskList"></ul>
        <button onclick="logout()" style="background:transparent; border:1px solid white; margin-top:10px;">Logout</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
